baseURL = "https://colaresamanda.github.io/blog/"
languageCode = "pt-br"
defaultContentLanguage = "pt-br"
title = "PsycheMap Blog"
theme = "PaperMod"
paginate = 6

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "PsycheMap Blog"
  description = "Explorando a interseção entre psicologia, ciência de dados e saúde emocional."
  keywords = ["psicologia", "ciência de dados", "saúde emocional", "diário emocional", "bem-estar mental", "PsycheMap"]
  author = "Amanda Colares"
  DateFormat = "2 de January de 2006"

  defaultTheme = "dark"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
    disableHLJS = false

  [params.label]
    text = "🧠 PsycheMap Blog"
    iconHeight = 35

  [params.profileMode]
    enabled = true
    title = "PsycheMap Blog"
    subtitle = "Explorando a mente através de dados ✨"
    imageUrl = ""
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = "📝 Posts"
      url = "posts"

    [[params.profileMode.buttons]]
      name = "🏷️ Tags"
      url = "tags"

    [[params.profileMode.buttons]]
      name = "📚 Categorias"
      url = "categories"

  [params.homeInfoParams]
    Title = "Olá! 👋"
    Content = "Bem-vindo ao PsycheMap Blog — onde psicologia encontra ciência de dados."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/colaresamanda"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:colares.amd@gmail.com"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "posts"
  name = "📝 Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "📚 Categorias"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "🏷️ Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "🔍 Buscar"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "👩‍💻 Sobre"
  url = "/about/"
  weight = 50

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    noClasses = false
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
