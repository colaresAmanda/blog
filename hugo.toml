baseURL = "https://colaresamanda.github.io/blog/"
languageCode = "en-us"
defaultContentLanguage = "en-us"
title = "PsycheMap Analytics"
theme = "PaperMod"
paginate = 6

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = false # Disabled per your preference for a clean, professional look

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "PsycheMap Analytics"
  description = "Quantitative analysis of emotional states and predictive modeling applied to mental health."
  keywords = ["Data Science", "Data Analysis", "Quantitative Psychology", "Machine Learning", "Python", "Mental Health", "PsycheMap"]
  author = "Amanda Colares"
  DateFormat = "January 2, 2006"

  defaultTheme = "dark"
  disableThemeToggle = false

  # Technical post features
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true 
  tocopen = true

  [params.assets]
    disableHLJS = false

  [params.label]
    text = "PsycheMap Analytics"
    iconHeight = 35

  [params.profileMode]
    enabled = true
    title = "PsycheMap Data Lab"
    subtitle = "Researching emotional cycles through algorithms, statistical modeling, and behavioral data."
    imageUrl = "" 
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = "Publications"
      url = "posts"

    [[params.profileMode.buttons]]
      name = "Insights"
      url = "categories/insights" 

    [[params.profileMode.buttons]]
      name = "Methodology"
      url = "about"

  [params.homeInfoParams]
    Title = "Evidence-Based Insights"
    Content = "Welcome to the PsycheMap repository. This platform explores human behavior through the lens of metrics, predictive models, and data science."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/colaresamanda"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:colares.amd@gmail.com"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Clean and professional navigation
[[menu.main]]
  identifier = "posts"
  name = "Publications"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "insights"
  name = "Insights"
  url = "/categories/insights/"
  weight = 20

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "About the Project"
  url = "/about/"
  weight = 50

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    noClasses = false
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true